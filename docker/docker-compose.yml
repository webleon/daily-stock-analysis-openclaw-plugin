version: '3.8'

services:
  daily-stock-analysis:
    image: ghcr.io/zhulinsen/daily_stock_analysis:latest
    container_name: daily_stock_analysis
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - dsa-network

networks:
  dsa-network:
    driver: bridge
